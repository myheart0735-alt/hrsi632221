<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>세종 카페 가이드 ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

        :root {
            --soft-pink: #FFDDE2;
            --soft-blue: #E0F2F7;
            --cherry-blossom: #FFB7C5;
            --insta-rose: #E4405F;
            --naver-green: #03C75A; /* 네이버 상징색 추가 */
            --text-main: #555555;
            --glass-white: rgba(255, 255, 255, 0.7);
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, var(--soft-pink) 0%, var(--soft-blue) 100%);
            background-attachment: fixed;
            margin: 0;
            padding: 60px 20px;
            color: var(--text-main);
            letter-spacing: -0.5px;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem; 
            font-weight: 900;
            background: linear-gradient(to right, #FF85A1, #E4405F);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
            gap: 15px;
            text-shadow: 3px 3px 6px rgba(255, 183, 197, 0.3);
        }

        header h1 img {
            height: 1.2em;
            width: auto;
            filter: drop-shadow(0 0 5px rgba(255, 183, 197, 0.8));
        }

        header p {
            color: #888;
            font-size: 1rem;
            background: var(--glass-white);
            display: inline-block;
            padding: 8px 20px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            font-weight: 600;
        }

        /* --- 추가: 로딩 스피너 디자인 --- */
        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 50px;
        }

        .loader {
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--cherry-blossom);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* ------------------------- */

        .controls-wrapper {
            max-width: 800px;
            margin: 0 auto 50px;
            position: sticky;
            top: 20px;
            z-index: 100;
            background: var(--glass-white);
            backdrop-filter: blur(15px);
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .search-container {
            display: flex;
            background: white;
            border-radius: 50px;
            margin-bottom: 15px;
            overflow: hidden;
            border: 2px solid var(--soft-pink);
        }

        .search-container input {
            flex: 1;
            border: none;
            padding: 15px 25px;
            font-size: 1rem;
            outline: none;
            background: transparent;
        }

        .search-container button {
            background: linear-gradient(45deg, #FF85A1, #FFB7C5);
            color: white;
            border: none;
            padding: 0 35px;
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
        }

        .filter-tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }

        .filter-btn {
            background: white;
            border: none;
            padding: 8px 18px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            border-radius: 20px;
            color: #aaa;
            box-shadow: 3px 3px 6px rgba(0,0,0,0.03);
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--cherry-blossom);
            color: white;
        }

        .cafe-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .cafe-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            padding: 30px;
            position: relative;
            transition: all 0.3s ease;
            text-align: center;
            box-shadow: 10px 10px 20px rgba(0,0,0,0.02);
            border: 1px solid rgba(255,255,255,0.8);
            opacity: 0;
            transform: translateY(20px);
        }

        .cafe-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .cafe-card:hover {
            transform: translateY(-10px);
            box-shadow: 20px 20px 40px rgba(255, 183, 197, 0.2);
        }

        .cafe-thumb {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #FFF0F3, #FFDDE2);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #FF85A1;
            font-weight: 900;
            font-size: 1.8rem;
            margin: 0 auto 20px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.05);
            border: 2px solid white;
        }

        .cafe-card h3 {
            margin: 0 0 10px 0;
            color: #555;
            font-size: 1.3rem;
            font-weight: 900;
        }

        .tag-container {
            margin-bottom: 10px;
        }

        .tag {
            display: inline-block;
            font-size: 0.75rem;
            background: #FFF0F3;
            color: #FF85A1;
            padding: 5px 12px;
            font-weight: 700;
            border-radius: 15px;
            margin: 2px;
        }

        .cafe-card p {
            font-size: 0.85rem;
            color: #999;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        /* --- 추가: 네이버 지도 버튼 디자인 --- */
        .map-link {
            text-decoration: none;
            background: var(--naver-green);
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 700;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            margin-top: auto; /* 카드 하단에 고정 */
        }

        .map-link:hover {
            opacity: 0.9;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<header>
    <h1>
        <img src="https://img.icons8.com/emoji/96/cherry-blossom.png" alt="벚꽃">
        효린이와 수인이의 세종시 맞춤 카페 검색
    </h1>
    <p id="info-text">데이터를 불러오는 중...</p>
</header>

<div class="controls-wrapper">
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="봄날 가기 좋은 카페를 찾아보세요 🌸">
        <button id="searchBtn">FIND</button>
    </div>
    
    <div class="filter-tags" id="filterTags">
        <button class="filter-btn active" onclick="filterByLocation('전체', event)">#전체</button>
        <button class="filter-btn" onclick="filterByLocation('보람동', event)">#보람동</button>
        <button class="filter-btn" onclick="filterByLocation('나성동', event)">#나성동</button>
        <button class="filter-btn" onclick="filterByLocation('어진동', event)">#어진동</button>
        <button class="filter-btn" onclick="filterByLocation('도담동', event)">#도담동</button>
        <button class="filter-btn" onclick="filterByLocation('고운동', event)">#고운동</button>
        <button class="filter-btn" onclick="filterByLocation('조치원읍', event)">#조치원</button>
    </div>
</div>

<div id="loader" class="loader-container">
    <div class="loader"></div>
    <p>효린수인이의 카페 데이터를 가져오고 있어요... ✨</p>
</div>

<div class="cafe-grid" id="cafeGrid"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
    let allCafes = [];
    
    const scrollObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
            }
        });
    }, { threshold: 0.1 });

    function init() {
        Papa.parse('cafes_sejong.csv', {
            download: true,
            header: true,
            complete: function(results) {
                // 로딩 숨기기
                document.getElementById('loader').style.display = 'none';
                
                allCafes = results.data.filter(cafe => cafe.name);
                renderCafes(allCafes);
                updateCount(`총 ${allCafes.length}곳의 따스한 카페가 기다려요 🌿`);
            }
        });
    }

    function renderCafes(cafes) {
        const grid = document.getElementById('cafeGrid');
        grid.innerHTML = '';

        cafes.forEach((cafe) => {
            const card = document.createElement('div');
            card.className = 'cafe-card';
            const firstChar = cafe.name.charAt(0);
            
            // 네이버 검색 링크 생성
            const mapUrl = `https://map.naver.com/v5/search/${encodeURIComponent(cafe.name + ' ' + cafe.location)}`;

            card.innerHTML = `
                <div class="cafe-thumb">${firstChar}</div>
                <div class="cafe-info">
                    <h3>${cafe.name}</h3>
                    <div class="tag-container">
                        <span class="tag">#${cafe.location}</span>
                        <span class="tag">#세종카페</span>
                    </div>
                    <p>${cafe.address}</p>
                    <a href="${mapUrl}" target="_blank" class="map-link">
                        📍 네이버 지도
                    </a>
                </div>
            `;

            grid.appendChild(card);
            scrollObserver.observe(card);
        });
    }

    function updateCount(text) {
        document.getElementById('info-text').innerText = text;
    }

    function filterByLocation(loc, e) {
        const btns = document.querySelectorAll('.filter-btn');
        btns.forEach(btn => btn.classList.remove('active'));
        e.target.classList.add('active');

        if(loc === '전체') {
            renderCafes(allCafes);
            updateCount(`총 ${allCafes.length}곳의 따스한 카페가 기다려요 🌿`);
        } else {
            const filtered = allCafes.filter(cafe => cafe.location.includes(loc));
            renderCafes(filtered);
            updateCount(`'${loc}' 추천 카페 ${filtered.length}곳 🌸`);
        }
    }

    function handleSearch() {
        const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
        const filtered = allCafes.filter(cafe => 
            cafe.name.toLowerCase().includes(keyword) || 
            cafe.location.toLowerCase().includes(keyword) ||
            cafe.address.toLowerCase().includes(keyword)
        );
        renderCafes(filtered);
        updateCount(`'${keyword}' 검색 결과: ${filtered.length}곳 ✨`);
    }

    document.getElementById('searchBtn').onclick = handleSearch;
    document.getElementById('searchInput').onkeyup = (e) => { if (e.key === 'Enter') handleSearch(); };

    window.onload = init;
</script>

</body>
</html>
